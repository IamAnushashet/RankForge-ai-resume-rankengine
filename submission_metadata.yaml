ai_usage_summary: |
  Advanced agentic reasoning was utilized to architect a multi-stage hybrid ranking system 
  integrating TF-IDF, Semantic Reranking, and Honeypot detection layers.
methodology_summary: |
  State-of-the-art offline ranking using a 5-stage pipeline:
  1. Fast Hybrid Retrieval (TF-IDF + Skill Match)
  2. Semantic Reranking (all-MiniLM-L6-v2)
  3. Behavior & Reliability scoring
  4. Production-evidence capability scoring
  5. Explainable final rank generation with specific boosters/penalties.
  Performance optimized via parquet caching and parallelized feature extraction.
